{% extends 'base.html' %}

{% block title %}Delete Student | LMS{% endblock %}

{% block content %}
<section class="container py-4">
	<div class="card shadow-sm border-0">
		<div class="card-body p-4 p-lg-5">
			<span class="eyebrow text-danger">Danger zone</span>
			<h1 class="h2 mb-3">Delete Student</h1>
			<p class="text-secondary mb-4">Are you sure you want to delete <strong>{{ object.name }}</strong>?</p>

			<form method="post" class="d-flex flex-wrap gap-2" data-loading-submit>
				{% csrf_token %}
				<button class="btn btn-danger" type="submit">Yes, Delete</button>
				<a class="btn btn-outline-secondary" href="{% url 'student:student-list' %}">Cancel</a>
			</form>
		</div>
	</div>
</section>
{% endblock %}
