{% extends 'base.html' %}

{% block title %}Server Error | LMS{% endblock %}

{% block content %}
<section class="container py-5">
    <div class="card border-0 shadow-sm">
        <div class="card-body p-4 p-lg-5">
            <span class="eyebrow">System Status</span>
            <h1 class="h3 mb-3">Temporary Server Error</h1>
            <p class="text-secondary mb-4">{{ error_message }}</p>
            <div class="d-flex flex-wrap gap-2">
                <a class="btn btn-primary" href="{% url 'home' %}">Return Home</a>
                {% if request.user.is_authenticated %}
                <a class="btn btn-outline-primary" href="{% url 'attendance:attendance-report' %}">Open Reports</a>
                {% else %}
                <a class="btn btn-outline-secondary" href="{% url 'login' %}">Login</a>
                {% endif %}
            </div>
        </div>
    </div>
</section>
{% endblock %}
