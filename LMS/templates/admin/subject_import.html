{% extends "admin/base_site.html" %}

{% block content %}
<div id="content-main">
    <h1>Import Subjects from XLSX</h1>
    <p>Upload an XLSX file with columns: <strong>name, abbreviation, code, faculty</strong>.</p>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <fieldset class="module aligned">
            <div class="form-row">
                <label for="xlsx_file">XLSX file:</label>
                <input type="file" name="xlsx_file" id="xlsx_file" accept=".xlsx" required>
            </div>
        </fieldset>
        <div class="submit-row">
            <input type="submit" value="Import" class="default">
            <a href="{% url 'admin:student_subject_changelist' %}" class="button cancel-link">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
